<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Label Check</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --text: #171717;
      --muted: #4b5563;
      --line: #b8b8ad;
      --focus: #064e8a;
      --approved: #166534;
      --approved-bg: #e7f6ea;
      --review: #9a3412;
      --review-bg: #fff0db;
      --fail-bg: #fff1f2;
      --fail-line: #b91c1c;
      --button: #0b4f71;
      --button-hover: #073c56;
      --button-disabled: #737373;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 20px;
      line-height: 1.45;
    }

    main {
      width: min(100%, 1040px);
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2.25rem, 6vw, 4rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h2 {
      font-size: 1.55rem;
    }

    h3 {
      font-size: 1.25rem;
    }

    p {
      margin: 0;
    }

    .intro {
      margin-bottom: 22px;
      color: var(--muted);
      font-size: 1.2rem;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .mode-button,
    .secondary-action {
      min-height: 52px;
      border: 2px solid var(--button);
      border-radius: 6px;
      background: #fff;
      color: var(--button);
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      padding: 10px 14px;
    }

    .mode-button.active,
    .secondary-action.strong {
      background: var(--button);
      color: #fff;
    }

    .panel {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      margin-top: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 1.15rem;
      font-weight: 700;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input[type="text"],
    input[type="file"],
    textarea {
      width: 100%;
      min-height: 54px;
      border: 2px solid #6b7280;
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 12px 14px;
    }

    input[type="file"] {
      padding: 10px;
    }

    textarea {
      min-height: 126px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    button:focus {
      outline: 4px solid var(--focus);
      outline-offset: 3px;
    }

    .chosen-file {
      min-height: 32px;
      color: var(--muted);
      font-weight: 700;
    }

    .primary-action {
      width: 100%;
      min-height: 70px;
      margin-top: 22px;
      border: 0;
      border-radius: 6px;
      background: var(--button);
      color: #fff;
      cursor: pointer;
      font-size: 1.45rem;
      font-weight: 800;
    }

    .primary-action:hover:not(:disabled),
    .mode-button:hover,
    .secondary-action:hover:not(:disabled) {
      filter: brightness(0.95);
    }

    .primary-action:disabled,
    .secondary-action:disabled {
      background: var(--button-disabled);
      border-color: var(--button-disabled);
      color: #fff;
      cursor: not-allowed;
    }

    .message {
      display: none;
      margin-top: 18px;
      border: 3px solid #7f1d1d;
      border-radius: 8px;
      background: #fff1f2;
      color: #7f1d1d;
      padding: 16px;
      font-weight: 800;
    }

    .message.show,
    .loading.show,
    .results.show {
      display: block;
    }

    .loading {
      display: none;
      margin-top: 18px;
      border: 3px solid #92400e;
      border-radius: 8px;
      background: #fffbeb;
      color: #78350f;
      padding: 16px;
      font-weight: 800;
    }

    .results,
    .hidden {
      display: none;
    }

    .batch-list {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }

    .batch-card {
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      background: #fff;
    }

    .batch-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .batch-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .verdict {
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 18px;
      border: 4px solid currentColor;
    }

    .verdict.approved {
      color: var(--approved);
      background: var(--approved-bg);
    }

    .verdict.review,
    .verdict.error {
      color: var(--review);
      background: var(--review-bg);
    }

    .verdict-title {
      display: block;
      font-size: clamp(2.25rem, 7vw, 4.75rem);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .verdict-copy {
      margin-top: 10px;
      color: var(--text);
      font-size: 1.25rem;
      font-weight: 700;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-box {
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      text-align: center;
    }

    .summary-number {
      display: block;
      font-size: 2.35rem;
      line-height: 1;
      font-weight: 900;
    }

    .summary-label {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-weight: 800;
    }

    .result-list {
      display: grid;
      gap: 12px;
    }

    .result-row {
      border: 2px solid var(--line);
      border-left-width: 10px;
      border-radius: 8px;
      background: #fff;
      padding: 16px;
    }

    .result-row.pass {
      border-left-color: var(--approved);
    }

    .result-row.fail,
    .result-row.error {
      border-color: var(--fail-line);
      border-left-color: var(--fail-line);
      background: var(--fail-bg);
    }

    .result-row.review {
      border-left-color: var(--review);
      background: var(--review-bg);
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 10px;
    }

    .result-name {
      font-size: 1.25rem;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .badge {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 8px 14px;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 900;
    }

    .badge.pass {
      background: var(--approved);
    }

    .badge.fail,
    .badge.error {
      background: var(--fail-line);
    }

    .badge.review {
      background: var(--review);
    }

    .value-line {
      margin-top: 6px;
      overflow-wrap: anywhere;
    }

    .value-label {
      font-weight: 900;
    }

    .reason {
      margin-top: 12px;
      font-weight: 900;
    }

    .detail {
      margin-top: 8px;
      color: var(--muted);
      font-size: 1rem;
    }

    .item-details {
      display: none;
      margin-top: 14px;
    }

    .item-details.open {
      display: block;
    }

    .time {
      margin-top: 16px;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 700;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 760px) {
      body {
        font-size: 18px;
      }

      main {
        padding: 18px 12px 36px;
      }

      .panel,
      .batch-card {
        padding: 16px;
      }

      .form-grid,
      .mode-switch,
      .batch-actions,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .result-head,
      .batch-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .badge {
        border-radius: 6px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Label Check</h1>
    <p class="intro">Choose label photos, fill in the boxes, and check the result.</p>

    <div class="mode-switch" role="tablist" aria-label="Choose label check type">
      <button id="single-mode" class="mode-button active" type="button">One Label</button>
      <button id="batch-mode" class="mode-button" type="button">Batch</button>
    </div>

    <section id="single-panel" class="panel" aria-labelledby="single-title">
      <h2 id="single-title">Check one label</h2>
      <form id="single-form" novalidate>
        <div class="form-grid">
          <div class="field full">
            <label for="image">Choose Label Photo</label>
            <input id="image" name="image" type="file" accept="image/jpeg,image/png,.jpg,.jpeg,.png" />
            <div id="chosen-file" class="chosen-file" aria-live="polite">No photo chosen yet.</div>
          </div>

          <div class="field">
            <label for="brand">Brand</label>
            <input id="brand" name="brand" type="text" autocomplete="off" />
          </div>

          <div class="field">
            <label for="product-class">Class or Type</label>
            <input id="product-class" name="product_class" type="text" autocomplete="off" />
          </div>

          <div class="field">
            <label for="producer">Producer</label>
            <input id="producer" name="producer" type="text" autocomplete="off" />
          </div>

          <div class="field">
            <label for="country">Country</label>
            <input id="country" name="country" type="text" autocomplete="off" />
          </div>

          <div class="field">
            <label for="abv">Alcohol %</label>
            <input id="abv" name="abv" type="text" autocomplete="off" />
          </div>

          <div class="field">
            <label for="net-contents">Bottle Size</label>
            <input id="net-contents" name="net_contents" type="text" autocomplete="off" />
          </div>

          <div class="field full">
            <label for="government-warning">Government Warning</label>
            <textarea id="government-warning" name="government_warning"></textarea>
          </div>
        </div>

        <button id="single-submit" class="primary-action" type="submit">Check Label</button>
      </form>
    </section>

    <section id="batch-panel" class="panel hidden" aria-labelledby="batch-title">
      <h2 id="batch-title">Batch Label Check</h2>
      <form id="batch-form" novalidate>
        <div id="batch-list" class="batch-list"></div>
        <div class="batch-actions">
          <button id="add-label" class="secondary-action" type="button">Add Another Label</button>
          <button id="batch-submit" class="primary-action" type="submit">Check All Labels</button>
        </div>
      </form>
    </section>

    <div id="error-message" class="message" role="alert"></div>
    <div id="loading-message" class="loading" role="status" aria-live="polite">Checking labels now.</div>

    <section id="results" class="panel results" aria-live="polite" aria-labelledby="results-title">
      <h2 id="results-title" class="sr-only">Results</h2>
      <div id="verdict"></div>
      <div id="summary"></div>
      <div id="result-list" class="result-list"></div>
      <div id="time" class="time"></div>
    </section>
  </main>

  <script>
    const singleMode = document.getElementById('single-mode');
    const batchMode = document.getElementById('batch-mode');
    const singlePanel = document.getElementById('single-panel');
    const batchPanel = document.getElementById('batch-panel');
    const singleForm = document.getElementById('single-form');
    const batchForm = document.getElementById('batch-form');
    const imageInput = document.getElementById('image');
    const chosenFile = document.getElementById('chosen-file');
    const singleSubmit = document.getElementById('single-submit');
    const batchSubmit = document.getElementById('batch-submit');
    const addLabelButton = document.getElementById('add-label');
    const batchList = document.getElementById('batch-list');
    const errorMessage = document.getElementById('error-message');
    const loadingMessage = document.getElementById('loading-message');
    const results = document.getElementById('results');
    const verdict = document.getElementById('verdict');
    const summary = document.getElementById('summary');
    const resultList = document.getElementById('result-list');
    const time = document.getElementById('time');

    const maxBatchLabels = 5;
    let batchId = 0;
    let progressTimer = null;

    const singleFields = [
      { key: 'brand', element: document.getElementById('brand') },
      { key: 'class', element: document.getElementById('product-class') },
      { key: 'producer', element: document.getElementById('producer') },
      { key: 'country', element: document.getElementById('country') },
      { key: 'abv', element: document.getElementById('abv') },
      { key: 'net_contents', element: document.getElementById('net-contents') },
      { key: 'government_warning', element: document.getElementById('government-warning') },
    ];

    const fieldLabels = {
      brand: 'Brand',
      product_class: 'Class or Type',
      producer: 'Producer',
      country: 'Country',
      abv: 'Alcohol %',
      net_contents: 'Bottle Size',
      government_warning: 'Government Warning',
    };

    const orderedFieldNames = [
      'brand',
      'product_class',
      'producer',
      'country',
      'abv',
      'net_contents',
      'government_warning',
    ];

    const batchFieldConfig = [
      ['brand', 'Brand', 'input'],
      ['class', 'Class or Type', 'input'],
      ['producer', 'Producer', 'input'],
      ['country', 'Country', 'input'],
      ['abv', 'Alcohol %', 'input'],
      ['net_contents', 'Bottle Size', 'input'],
      ['government_warning', 'Government Warning', 'textarea'],
    ];

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function clearError() {
      errorMessage.textContent = '';
      errorMessage.classList.remove('show');
    }

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
    }

    function clearResults() {
      results.classList.remove('show');
      verdict.className = '';
      verdict.innerHTML = '';
      summary.innerHTML = '';
      resultList.innerHTML = '';
      time.textContent = '';
    }

    function setMode(mode) {
      const isBatch = mode === 'batch';
      batchPanel.classList.toggle('hidden', !isBatch);
      singlePanel.classList.toggle('hidden', isBatch);
      batchMode.classList.toggle('active', isBatch);
      singleMode.classList.toggle('active', !isBatch);
      clearError();
      clearResults();
    }

    function setBusy(isBusy, labelCount = 1) {
      const controls = document.querySelectorAll('input, textarea, button');
      controls.forEach((control) => {
        control.disabled = isBusy;
      });

      if (!isBusy) {
        updateBatchButtons();
      }

      singleSubmit.textContent = isBusy ? 'Checking...' : 'Check Label';
      batchSubmit.textContent = isBusy ? 'Checking...' : 'Check All Labels';
      loadingMessage.textContent = 'Checking labels now.';
      loadingMessage.classList.toggle('show', isBusy);

      if (progressTimer) {
        clearTimeout(progressTimer);
        progressTimer = null;
      }

      if (isBusy) {
        progressTimer = setTimeout(() => {
          loadingMessage.textContent = labelCount === 1
            ? 'Still checking the label...'
            : `Checking ${labelCount} labels...`;
        }, 800);
      }
    }

    function readProblem(responseBody, statusCode) {
      const detail = responseBody && responseBody.detail ? String(responseBody.detail) : '';
      const lowerDetail = detail.toLowerCase();

      if (lowerDetail.includes('invalid image format')) {
        return 'Please choose a JPG or PNG image.';
      }

      if (lowerDetail.includes('too large') || lowerDetail.includes('maximum allowed size is 5')) {
        return lowerDetail.includes('batch')
          ? 'Please check 5 labels or fewer at one time.'
          : 'Please choose an image under 5 MB.';
      }

      if (lowerDetail.includes('each label needs')) {
        return 'Each label needs one photo and one set of boxes.';
      }

      if (lowerDetail.includes('application_data') || lowerDetail.includes('missing required fields')) {
        return 'Please fill in all seven boxes for each label.';
      }

      if (statusCode >= 500) {
        return 'The label checker had a problem. Please try again.';
      }

      return detail || 'Something went wrong while checking the label. Please try again.';
    }

    function plainReason(result) {
      const message = String(result.message || '').toLowerCase();

      if (message.includes('missing') || !result.extracted) {
        return 'The label checker could not find this on the label.';
      }

      if (result.field_name === 'government_warning') {
        return 'The government warning must match exactly, including capital letters, punctuation, and spacing.';
      }

      return 'The value found on the label does not match the expected value.';
    }

    function buildSinglePayload() {
      const data = {};
      singleFields.forEach((field) => {
        data[field.key] = field.element.value.trim();
      });
      return data;
    }

    function singleHasAllFields() {
      return singleFields.every((field) => field.element.value.trim().length > 0);
    }

    function renderFieldResults(fieldResults) {
      const byName = new Map((fieldResults || []).map((result) => [result.field_name, result]));
      return orderedFieldNames.map((fieldName) => {
        const result = byName.get(fieldName);
        const label = fieldLabels[fieldName] || fieldName;

        if (!result) {
          return `
            <article class="result-row fail">
              <div class="result-head">
                <div class="result-name">${escapeHtml(label)}</div>
                <div class="badge fail">FAIL</div>
              </div>
              <p class="reason">This result was not returned. Please try again.</p>
            </article>
          `;
        }

        const didPass = result.status === 'PASS';
        const expected = escapeHtml(result.expected || '');
        const found = escapeHtml(result.extracted || 'Not found');
        const detail = result.message ? `<p class="detail">${escapeHtml(result.message)}</p>` : '';

        if (didPass) {
          return `
            <article class="result-row pass">
              <div class="result-head">
                <div class="result-name">${escapeHtml(label)}</div>
                <div class="badge pass">PASS</div>
              </div>
              <p class="value-line"><span class="value-label">Found on Label:</span> ${found}</p>
            </article>
          `;
        }

        return `
          <article class="result-row fail">
            <div class="result-head">
              <div class="result-name">${escapeHtml(label)}</div>
              <div class="badge fail">FAIL</div>
            </div>
            <p class="reason">${escapeHtml(plainReason(result))}</p>
            <p class="value-line"><span class="value-label">Expected:</span> ${expected || 'Blank'}</p>
            <p class="value-line"><span class="value-label">Found on Label:</span> ${found}</p>
            ${detail}
          </article>
        `;
      }).join('');
    }

    function renderSingleResults(data) {
      const isApproved = data.overall_status === 'PASS';
      verdict.className = `verdict ${isApproved ? 'approved' : 'review'}`;
      verdict.innerHTML = `
        <span class="verdict-title">${isApproved ? 'APPROVED' : 'NEEDS REVIEW'}</span>
        <p class="verdict-copy">${isApproved ? 'All fields matched.' : 'One or more fields need a closer look.'}</p>
      `;
      summary.innerHTML = '';
      resultList.innerHTML = renderFieldResults(data.field_results);
      time.textContent = typeof data.latency_ms === 'number'
        ? `Checked in ${(data.latency_ms / 1000).toFixed(1)} seconds.`
        : '';
      results.classList.add('show');
      results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function updateBatchButtons() {
      const cards = batchList.querySelectorAll('.batch-card');
      addLabelButton.disabled = cards.length >= maxBatchLabels;
      cards.forEach((card, index) => {
        card.querySelector('.batch-title').textContent = `Label ${index + 1}`;
        const removeButton = card.querySelector('.remove-label');
        removeButton.disabled = cards.length === 1;
      });
    }

    function createBatchCard() {
      batchId += 1;
      const card = document.createElement('article');
      card.className = 'batch-card';
      card.dataset.batchId = String(batchId);
      const prefix = `batch-${batchId}`;
      const fieldsHtml = batchFieldConfig.map(([key, label, type]) => {
        const id = `${prefix}-${key}`;
        const fieldClass = key === 'government_warning' ? 'field full' : 'field';
        const control = type === 'textarea'
          ? `<textarea id="${id}" data-batch-field="${key}"></textarea>`
          : `<input id="${id}" data-batch-field="${key}" type="text" autocomplete="off" />`;
        return `
          <div class="${fieldClass}">
            <label for="${id}">${label}</label>
            ${control}
          </div>
        `;
      }).join('');

      card.innerHTML = `
        <div class="batch-head">
          <h3 class="batch-title">Label</h3>
          <button class="secondary-action remove-label" type="button">Remove</button>
        </div>
        <div class="form-grid">
          <div class="field full">
            <label for="${prefix}-image">Choose Label Photo</label>
            <input id="${prefix}-image" data-batch-image type="file" accept="image/jpeg,image/png,.jpg,.jpeg,.png" />
            <div class="chosen-file" aria-live="polite">No photo chosen yet.</div>
          </div>
          ${fieldsHtml}
        </div>
      `;

      const fileInput = card.querySelector('[data-batch-image]');
      const fileLabel = card.querySelector('.chosen-file');
      fileInput.addEventListener('change', () => {
        const file = fileInput.files && fileInput.files[0];
        fileLabel.textContent = file ? `Chosen photo: ${file.name}` : 'No photo chosen yet.';
        clearError();
      });
      card.querySelector('.remove-label').addEventListener('click', () => {
        card.remove();
        updateBatchButtons();
        clearError();
      });
      card.querySelectorAll('input[type="text"], textarea').forEach((control) => {
        control.addEventListener('input', clearError);
      });

      batchList.appendChild(card);
      updateBatchButtons();
    }

    function getBatchItems() {
      return Array.from(batchList.querySelectorAll('.batch-card')).map((card) => {
        const image = card.querySelector('[data-batch-image]');
        const values = {};
        card.querySelectorAll('[data-batch-field]').forEach((control) => {
          values[control.dataset.batchField] = control.value.trim();
        });
        return {
          card,
          file: image.files && image.files[0],
          values,
        };
      });
    }

    function batchItemIsComplete(item) {
      return item.file && batchFieldConfig.every(([key]) => item.values[key]);
    }

    function renderBatchResults(data) {
      const counts = data.summary || { total: 0, passed: 0, needs_review: 0, errors: 0 };
      verdict.className = `verdict ${counts.errors || counts.needs_review ? 'review' : 'approved'}`;
      verdict.innerHTML = `
        <span class="verdict-title">${counts.errors || counts.needs_review ? 'NEEDS REVIEW' : 'APPROVED'}</span>
        <p class="verdict-copy">${counts.total} labels checked.</p>
      `;
      summary.innerHTML = `
        <div class="summary-grid">
          <div class="summary-box"><span class="summary-number">${counts.total}</span><span class="summary-label">Total</span></div>
          <div class="summary-box"><span class="summary-number">${counts.passed}</span><span class="summary-label">Approved</span></div>
          <div class="summary-box"><span class="summary-number">${counts.needs_review}</span><span class="summary-label">Needs Review</span></div>
          <div class="summary-box"><span class="summary-number">${counts.errors || 0}</span><span class="summary-label">Errors</span></div>
        </div>
      `;

      resultList.innerHTML = (data.results || []).map((item) => {
        const label = item.filename || `Label ${item.index + 1}`;
        const statusClass = item.status === 'PASS' ? 'pass' : item.status === 'ERROR' ? 'error' : 'review';
        const statusText = item.status === 'PASS' ? 'APPROVED' : item.status === 'ERROR' ? 'ERROR' : 'NEEDS REVIEW';
        const failedCount = item.result && Array.isArray(item.result.field_results)
          ? item.result.field_results.filter((field) => field.status === 'FAIL').length
          : 0;
        const detailId = `item-details-${item.index}`;
        const detailButton = item.result
          ? `<button class="secondary-action details-toggle" type="button" data-target="${detailId}" aria-expanded="false">View Details</button>`
          : '';
        const details = item.result
          ? `<div id="${detailId}" class="item-details">${renderFieldResults(item.result.field_results)}</div>`
          : '';
        const supportingText = item.status === 'ERROR'
          ? `<p class="reason">${escapeHtml(item.error || 'Something went wrong while checking this label. Please try again.')}</p>`
          : `<p class="value-line">${failedCount ? `${failedCount} field${failedCount === 1 ? '' : 's'} need a closer look.` : 'All fields matched.'}</p>`;

        return `
          <article class="result-row ${statusClass}">
            <div class="result-head">
              <div>
                <div class="result-name">${escapeHtml(label)}</div>
                ${supportingText}
              </div>
              <div class="badge ${statusClass}">${statusText}</div>
            </div>
            ${detailButton}
            ${details}
          </article>
        `;
      }).join('');

      time.textContent = typeof data.latency_ms === 'number'
        ? `Checked in ${(data.latency_ms / 1000).toFixed(1)} seconds.`
        : '';
      results.classList.add('show');
      results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function submitForm(url, formData, labelCount, render) {
      setBusy(true, labelCount);
      try {
        const response = await fetch(url, {
          method: 'POST',
          body: formData,
        });

        let data = null;
        try {
          data = await response.json();
        } catch (error) {
          data = null;
        }

        if (!response.ok) {
          showError(readProblem(data, response.status));
          return;
        }

        render(data);
      } catch (error) {
        showError('The label checker could not be reached. Please try again.');
      } finally {
        setBusy(false);
      }
    }

    singleMode.addEventListener('click', () => setMode('single'));
    batchMode.addEventListener('click', () => setMode('batch'));

    imageInput.addEventListener('change', () => {
      const file = imageInput.files && imageInput.files[0];
      chosenFile.textContent = file ? `Chosen photo: ${file.name}` : 'No photo chosen yet.';
      clearError();
    });

    singleFields.forEach((field) => {
      field.element.addEventListener('input', clearError);
    });

    singleForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearError();
      clearResults();

      if (!imageInput.files || !imageInput.files[0]) {
        showError('Please choose a label photo.');
        return;
      }

      if (!singleHasAllFields()) {
        showError('Please fill in all seven boxes.');
        return;
      }

      const formData = new FormData();
      formData.append('image', imageInput.files[0]);
      formData.append('application_data', JSON.stringify(buildSinglePayload()));
      await submitForm('/verify', formData, 1, renderSingleResults);
    });

    addLabelButton.addEventListener('click', () => {
      if (batchList.querySelectorAll('.batch-card').length >= maxBatchLabels) {
        showError('Please check 5 labels or fewer at one time.');
        return;
      }
      createBatchCard();
    });

    batchForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearError();
      clearResults();

      const items = getBatchItems();
      if (items.length > maxBatchLabels) {
        showError('Please check 5 labels or fewer at one time.');
        return;
      }

      if (!items.every(batchItemIsComplete)) {
        showError('Each label needs one photo and all seven boxes filled in.');
        return;
      }

      const formData = new FormData();
      const applicationData = [];
      items.forEach((item) => {
        formData.append('images', item.file);
        applicationData.push(item.values);
      });
      formData.append('application_data', JSON.stringify(applicationData));
      await submitForm('/verify/batch', formData, items.length, renderBatchResults);
    });

    resultList.addEventListener('click', (event) => {
      const button = event.target.closest('.details-toggle');
      if (!button) {
        return;
      }
      const target = document.getElementById(button.dataset.target);
      if (!target) {
        return;
      }
      const isOpen = target.classList.toggle('open');
      button.setAttribute('aria-expanded', String(isOpen));
      button.textContent = isOpen ? 'Hide Details' : 'View Details';
    });

    createBatchCard();
  </script>
</body>
</html>
