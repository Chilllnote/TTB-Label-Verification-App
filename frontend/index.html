<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Label Check</title>
  <link rel="stylesheet" href="/static/styles.css" />

</head>
<body>
  <main>
    <h1>Label Check</h1>
    <p class="intro">Choose label photos, fill in the boxes, and check the result.</p>

    <div class="mode-switch" role="tablist" aria-label="Choose label check type">
      <button id="single-mode" class="mode-button active" type="button" role="tab" aria-selected="true" aria-controls="single-panel">One Label</button>
      <button id="batch-mode" class="mode-button" type="button" role="tab" aria-selected="false" aria-controls="batch-panel" tabindex="-1">Batch</button>
    </div>

    <section id="single-panel" class="panel" role="tabpanel" aria-labelledby="single-mode">
      <h2 id="single-title">Check one label</h2>
      <form id="single-form" novalidate>
        <div class="form-grid">
          <div class="field full">
            <label for="image">Choose Label Photo</label>
            <input id="image" name="image" type="file" accept="image/*" required aria-describedby="chosen-file" />
            <div id="chosen-file" class="chosen-file" aria-live="polite">No photo chosen yet.</div>
            <div id="single-preview" class="image-preview" hidden>
              <img id="single-preview-image" alt="Selected label preview" />
            </div>
          </div>

          <div class="field">
            <label for="brand">Brand</label>
            <input id="brand" name="brand" type="text" autocomplete="off" required />
          </div>

          <div class="field">
            <label for="product-class">Class or Type</label>
            <input id="product-class" name="product_class" type="text" autocomplete="off" required />
          </div>

          <div class="field">
            <label for="producer">Producer</label>
            <input id="producer" name="producer" type="text" autocomplete="off" required />
          </div>

          <div class="field">
            <label for="country">Country</label>
            <input id="country" name="country" type="text" autocomplete="off" required />
          </div>

          <div class="field">
            <label for="abv">Alcohol %</label>
            <input id="abv" name="abv" type="text" autocomplete="off" required />
          </div>

          <div class="field">
            <label for="net-contents">Bottle Size</label>
            <input id="net-contents" name="net_contents" type="text" autocomplete="off" required />
          </div>

          <div class="field full">
            <label for="government-warning">Government Warning</label>
            <textarea id="government-warning" name="government_warning" required></textarea>
          </div>
        </div>

        <button id="single-submit" class="primary-action" type="submit">Check Label</button>
      </form>
    </section>

    <section id="batch-panel" class="panel hidden" role="tabpanel" aria-labelledby="batch-mode" hidden>
      <h2 id="batch-title">Batch Label Check</h2>
      <form id="batch-form" novalidate>
        <div id="batch-list" class="batch-list"></div>
        <div class="batch-actions">
          <button id="add-label" class="secondary-action" type="button">Add Another Label</button>
          <button id="batch-submit" class="primary-action" type="submit">Check All Labels</button>
        </div>
      </form>
    </section>

    <div id="error-message" class="message" role="alert" tabindex="-1"></div>
    <div id="loading-message" class="loading" role="status" aria-live="polite">Checking labels now.</div>

    <section id="results" class="panel results" aria-live="polite" aria-labelledby="results-title" tabindex="-1">
      <h2 id="results-title" class="sr-only">Results</h2>
      <div id="verdict"></div>
      <div id="summary"></div>
      <div id="result-list" class="result-list"></div>
      <div id="time" class="time"></div>
    </section>
  </main>

  <script type="module" src="/static/app.js"></script>

</body>
</html>
